server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS resolver — resolves at request time, not startup.
    # This prevents nginx from crashing if the backend container isn't up yet.
    resolver 127.0.0.11 valid=30s;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # API proxy → backend
    # Use a variable so nginx resolves 'kinoscribe-backend' at request time via the
    # resolver above, instead of failing hard at startup if DNS isn't ready.
    location /api/ {
        set $backend http://kinoscribe-backend:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # Poster images — larger buffers for image serving
    location /api/films/ {
        set $backend http://kinoscribe-backend:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffer_size 128k;
        proxy_buffers 4 512k;
    }

    # Video streaming — needs large buffers + range request support
    location ~ /api/films/[^/]+/video-stream {
        set $backend http://kinoscribe-backend:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Range $http_range;
        proxy_set_header Request-Range $http_request_range;
        proxy_buffer_size 256k;
        proxy_buffers 8 1M;
        proxy_read_timeout 3600s;
        client_max_body_size 0;
    }

    # Health endpoint
    location /health {
        set $backend http://kinoscribe-backend:8000;
        proxy_pass $backend;
    }

    # SPA fallback — all unknown paths → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}